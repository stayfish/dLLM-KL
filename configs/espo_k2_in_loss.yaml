wandb:
  entity: 'ruoyufang-uc-santa-barbara'
  resume: 'auto'
#   run_name: "rl_sdar_k3"
  run_id: "${training.method}_${model.model_base}_${training.kl_estimator}_${training.kl_mode}_bs${training.batch_size_lm}_accum${training.gradient_accumulation_steps}_ngpus${experiment.num_gpus}_beta${training.beta}_3_16_17"
  run_name: "${training.method}_${model.model_base}_${training.kl_estimator}_${training.kl_mode}_bs${training.batch_size_lm}_accum${training.gradient_accumulation_steps}_ngpus${experiment.num_gpus}_beta${training.beta}"
  project: "kl"
  desc: "除以 L1 发现 surrogate loss 太小，改成不除以 decrease beta"



experiment:
    project: "espo_k2_in_loss" # need to be same of this file name
    function: "train"  # no need to change
    num_gpus: 1
    start_from_scratch: True # set to True by default, if you stopped the training, and want to keep training with your ckpt model.optimized_name, set to False, and set current_epoch to the last step you stopped   
    total_step: 80
    save_every: 20
    eval_every: 5
    current_epoch: 1
    deepspeed_file: "1_node_${experiment.num_gpus}_gpus_deepspeed_zero3"
    num_node: 1
    node_index: 0
    is_debug: true
    main_process_port: 8820

model:
    pretrained_model: "/mnt/nvme0n1/ligong/collab/ruoyu/cache/huggingface/hub/models--JetLM--SDAR-1.7B-Chat/snapshots/97cf0dc9a7e85433f3f71a6bbac6fec9d381294f" # absolute path of your model
    optimized_name: "optimized" # the output name for your optimized model, will be saved under sft_dream/ckpt
    model_base: "sdar" # set sdar for TraDo and SDAR




dataset:
    train_dataset: "MATH_train" # "MATH_train""PrimeIntellect"
    optimization_data: "rl_data" # name of the rollout data output
    data_type: "math" # "math" "code" 

# also see explanations in eval configs
rollout:
    tensor_parallel_size: 1 # set to 1 by default, if oom, try reduce max_active first, if still oom, set tensor_parallel_size to 8
    max_active: 256
    num_task_per_step: 64
    num_response_per_task: 16
    temperature: 1.0
    max_token: 256
    block_size: 4
    denoising_steps_per_block: 4
    top_p: 1.0
    top_k: 0
    remasking_strategy: "low_confidence_dynamic" #"low_confidence_static""low_confidence_dynamic"
    dynamic_threshold: 0.9 # no use for "low_confidence_static"
    start_with_think: False
    base_port: 29020

execute:
    num_chunk: 128 # batch size of executing codes in coding eval tasks

training:
    gradient_checkpointing_enable: True
    gradient_accumulation_steps: 32
    batch_size_lm: 8
    mixed_precision: "bf16"
    enable_tf32: True
    seed: 10086
    num_train_epochs: 1
    max_grad_norm: 1.0
    method: "TraceESPO" # "random_masking" "TraceRL" "coupled"
    normalize_method: "dr_grpo" # "z_score" "dr_grpo"
    block_size: 4
    shrink: 1
    post_num: 0
    max_gen_length: 256
    max_prompt_len: 784
    lower_p: 0.1
    upper_p: 0.9
    eps: 0.20
    beta: 1e-3
    kl_estimator: "k2"   # "k1" "k2" "k3"
    kl_mode: "in_loss"    # "in_loss" "in_reward"


optimizer:
    name: adamw
    params: # default adamw params
        learning_rate: 1e-6
        scale_lr: False # scale learning rate by total batch size
        beta1: 0.9
        beta2: 0.999
        weight_decay: 0.0
        epsilon: 1e-8


lr_scheduler:
    scheduler: "cosine"
    params:
        learning_rate: ${optimizer.params.learning_rate}
        warmup_steps: 0
        min_lr_scale: 1.0


evaluation:
    eval_dataset: "MATH500"  # "MATH500" "LiveCodeBench"
    data_type: "math" # "math" "code"
    tensor_parallel_size: 1
    max_active: 16
    num_response_per_task: 3
    temperature: 1.0
    max_token: 2000
    block_size: 4
    denoising_steps_per_block: 4
    top_p: 1.0
    top_k: [0, 1]
    remasking_strategy: ["low_confidence_dynamic", "low_confidence_static"] #"low_confidence_static""low_confidence_dynamic"
    dynamic_threshold: 0.9 # no use for "low_confidence_static"
    start_with_think: False

# len(top_k) must == len(remasking_strategy)
